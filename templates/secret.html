<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Required</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#07080c;--s1:#0e1018;--s2:#141720;
      --accent:#00e5ff;--accent-dim:rgba(0,229,255,0.08);
      --red:#ff4757;--text:#e8eaf0;--muted:#5a6380;
      --border:#252b3d;--mono:'Space Mono',monospace;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden}

    /* Animated grid background */
    .bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px);background-size:50px 50px;animation:gridMove 20s linear infinite}
    @keyframes gridMove{0%{background-position:0 0}100%{background-position:50px 50px}}

    /* Radial glow */
    .bg-glow{position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 50%,rgba(0,229,255,0.04) 0%,transparent 70%)}

    /* Container */
    .container{position:relative;z-index:10;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}

    /* Lock icon */
    .lock-wrap{margin-bottom:2.5rem;animation:floatLock 3s ease-in-out infinite}
    @keyframes floatLock{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .lock-icon{width:64px;height:64px;border:2px solid var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;position:relative;background:var(--accent-dim)}
    .lock-icon::before{content:'';position:absolute;top:-18px;left:50%;transform:translateX(-50%);width:28px;height:20px;border:2px solid var(--accent);border-bottom:none;border-radius:14px 14px 0 0;opacity:0.7}
    .lock-icon svg{width:24px;height:24px;fill:var(--accent)}

    /* Card */
    .card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:2.5rem 3rem;width:100%;max-width:420px;position:relative;overflow:hidden}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}

    .card-tag{font-family:var(--mono);font-size:9px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:1rem;opacity:0.7}
    .card-title{font-size:1.4rem;font-weight:500;margin-bottom:0.4rem;letter-spacing:-0.02em}
    .card-sub{font-size:0.82rem;color:var(--muted);margin-bottom:2rem;line-height:1.6}

    /* Form */
    .input-wrap{position:relative;margin-bottom:1.25rem}
    .input-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;display:block}
    .input-field{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:0.75rem 1rem;color:var(--text);font-family:var(--mono);font-size:0.85rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s;letter-spacing:0.05em}
    .input-field:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,255,0.08)}
    .input-field::placeholder{color:var(--muted);letter-spacing:0.05em}

    /* Error state */
    .input-field.error{border-color:var(--red);box-shadow:0 0 0 3px rgba(255,71,87,0.08);animation:shake 0.35s ease}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
    .error-msg{font-family:var(--mono);font-size:10px;color:var(--red);margin-top:0.5rem;letter-spacing:0.03em;display:flex;align-items:center;gap:6px}
    .error-msg::before{content:'✗';font-size:11px}

    /* Submit button */
    .btn-submit{width:100%;background:var(--accent);color:#07080c;border:none;border-radius:8px;padding:0.8rem;font-family:var(--mono);font-size:0.8rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;margin-top:0.5rem}
    .btn-submit:hover{background:#33edff;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,229,255,0.3)}
    .btn-submit:active{transform:translateY(0)}

    /* Back link */
    .back-link{margin-top:2rem;font-family:var(--mono);font-size:10px;color:var(--muted);text-decoration:none;letter-spacing:0.05em;display:flex;align-items:center;gap:6px;transition:color 0.2s}
    .back-link:hover{color:var(--accent)}
    .back-link::before{content:'←';font-size:12px}

    /* Scanning line effect on card */
    .card::after{content:'';position:absolute;inset:0;background:linear-gradient(transparent 0%,rgba(0,229,255,0.015) 50%,transparent 100%);background-size:100% 8px;animation:scan 4s linear infinite;pointer-events:none}
    @keyframes scan{0%{background-position:0 -100%}100%{background-position:0 200%}}
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="container">
    <div class="lock-wrap">
      <div class="lock-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1C9.24 1 7 3.24 7 6v2H5c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2h-2V6c0-2.76-2.24-5-5-5zm0 2c1.66 0 3 1.34 3 3v2H9V6c0-1.66 1.34-3 3-3zm0 9c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2z"/>
        </svg>
      </div>
    </div>

    <div class="card">
      <div class="card-tag">Restricted Access</div>
      <div class="card-title">Secret Area</div>
      <div class="card-sub">Enter the access key to continue to the AutoTrader dashboard.</div>

      <form method="POST" action="/secret">
        <div class="input-wrap">
          <label class="input-label" for="password">Access Key</label>
          <input
            class="input-field {% if error %}error{% endif %}"
            type="password"
            id="password"
            name="password"
            placeholder="••••••••••••••••"
            autocomplete="current-password"
            autofocus
          >
          {% if error %}
          <div class="error-msg">Invalid access key — try again</div>
          {% endif %}
        </div>
        <button class="btn-submit" type="submit">Authenticate →</button>
      </form>
    </div>

    <a class="back-link" href="/">Back to Portfolio</a>
  </div>
</body>
</html>
